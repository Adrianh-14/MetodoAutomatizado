<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosivo Auto - Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card: #161b22;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        /* Drag & Drop Zone */
        #drop-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }

        #drop-zone.hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
        }

        #drop-zone p {
            font-size: 0.9rem;
            color: #8b949e;
        }

        /* Inputs */
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            color: white;
            resize: none;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            color: #3fb950;
            display: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MOSIVO AUTO</h1>
        <p>Panel de Gestión de Perfiles</p>
    </div>

    <!-- Carga de Perfiles -->
    <div class="card">
        <h2>Subir Perfiles (.txt)</h2>
        <div id="drop-zone">
            <p id="drop-text">Arrastra aquí tu .txt o haz clic</p>
            <input type="file" id="file-input" style="display: none" accept=".txt">
        </div>
        <div id="upload-status" class="status">¡Perfiles cargados con éxito!</div>
    </div>

    <!-- Configuración de Mensaje -->
    <div class="card">
        <h2>Mensaje a Reenviar</h2>
        <textarea id="msg-input" rows="4" placeholder="Escribe aquí el mensaje..."></textarea>
        <button class="btn" id="save-msg-btn">Guardar Mensaje</button>
        <div id="msg-status" class="status">Mensaje guardado correctamente.</div>
    </div>

    <!-- Lanzador -->
    <div class="card">
        <h2>Opciones de Ejecución</h2>
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
            <label style="font-size: 0.9rem; color: #8b949e;">Número de Ventanas (Hilos):</label>
            <input type="number" id="threads-input" value="3" min="1" max="10" 
                style="width: 60px; background: #000; border: 1px solid var(--primary); color: white; padding: 5px; border-radius: 5px; text-align: center;">
        </div>
        <button class="btn" id="start-btn" style="padding: 20px; font-size: 1.2rem; background: #3fb950; color: white;">
            <span id="btn-text">INICIAR AUTOMATIZACIÓN</span>
            <div class="loader" id="loader"></div>
        </button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const msgInput = document.getElementById('msg-input');
        const startBtn = document.getElementById('start-btn');
        const threadsInput = document.getElementById('threads-input');
        const loader = document.getElementById('loader');

        // Drag & Drop Functionality
        dropZone.onclick = () => fileInput.click();
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('hover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('hover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        };

        async function handleFile(file) {
            if (!file) return;
            const text = await file.text();
            document.getElementById('drop-text').innerText = `Archivo: ${file.name}`;
            
            try {
                const res = await fetch('/api/v1/upload-profiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: text
                });
                
                const data = await res.json();
                if (data.success) {
                    showStatus('upload-status');
                }
            } catch (err) {
                alert('Error al subir el archivo. Revisa el servidor.');
            }
        }

        // Save Message Functionality
        document.getElementById('save-msg-btn').onclick = async () => {
            try {
                const res = await fetch('/api/v1/update-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: msgInput.value })
                });
                if (res.ok) showStatus('msg-status');
            } catch (err) {
                alert('Error al guardar el mensaje.');
            }
        };

        // Start Automation Functionality
        startBtn.onclick = async () => {
            const numThreads = parseInt(threadsInput.value) || 3;
            startBtn.disabled = true;
            loader.style.display = 'block';
            document.getElementById('btn-text').innerText = 'Lanzando Ventanas...';

            try {
                const res = await fetch('/api/v1/iniciar-automatizacion', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threads: numThreads })
                });
                const data = await res.json();
                alert(`¡Sistema iniciado con ${numThreads} ventanas paralelas! Mira tu pantalla.`);
            } catch (e) {
                alert('Error al conectar con el servidor.');
            } finally {
                startBtn.disabled = false;
                loader.style.display = 'none';
                document.getElementById('btn-text').innerText = 'INICIAR AUTOMATIZACIÓN';
            }
        };

        function showStatus(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
