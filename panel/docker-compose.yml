version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: millonesgang-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: millonesgang
      POSTGRES_PASSWORD: M1ll0n3sG4ng_S3cur3!
      POSTGRES_DB: millonesgang_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U millonesgang -d millonesgang_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: millonesgang-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@millonesgang.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
